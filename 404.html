<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trunk.</title>
<script>
(function(){
  var path = location.pathname;
  if (path.match(/^\/t\/([A-Za-z0-9]{4,12})$/)) {
    var id = path.split('/')[2];
    location.replace('/app/#t/' + id);
  } else {
    location.replace('/');
  }
})();
</script>
</head>
<body></body>
</html>
